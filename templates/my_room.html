<!DOCTYPE html>
<html>

<head>

<title>My Room</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>


<body class="bg-light">


<div class="container mt-5">


<div class="card shadow p-4 mx-auto text-center" style="width:400px;">


<h2>
My Room Details
</h2>


{% if student %}


<h4>Name:</h4>
<p>{{student[1]}}</p>


<h4>Department:</h4>
<p>{{student[2]}}</p>


<h4>Room Number:</h4>
<p>{{student[3]}}</p>


{% else %}


<h4>No Room Allocated</h4>


{% endif %}



<a href="/dashboard" class="btn btn-primary">
Back Dashboard
</a>


</div>


</div>


</body>

</html>
